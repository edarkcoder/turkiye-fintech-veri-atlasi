name: Günlük BIST Raporu

on:
  schedule:
    # Her hafta içi sabah 09:30 İstanbul saati = 06:30 UTC
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # Elle tetiklemek için

jobs:
  rapor-gonder:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          pip install -r requirements.txt
          pip install nbconvert jupyter ipykernel

      - name: Raporu çalıştır ve e-mail gönder
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python rapor_gonder.py
